<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="amazone.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazone-Clone</title>
</head>
<body>
<!-- Header -->
<header class="header">
    <div class="logo">
      <h1>Amazone-Clone</h1>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="Search for products..." />
      <button>Search</button>
    </div>
    <div class="cart">
      <button>Cart (0)</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <h2>Featured Products</h2>
    <div class="product-list">
      <div class="product">
        <img src="laptob1.webp" alt="Product 1">
        <h3> HP 14 Laptop, Intel Celeron N4020, 4 GB RAM, 64 GB Storage, 14-inch </h3>
        <p>$329.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="laptob2.webp" alt="Product 2">
        <h3>HP 14 Inch Chromebook Laptop, 4GB RAM, 64GB </h3>
        <p>$329.99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="laptob3.jpg" alt="Product 3">
        <h3>HP Victus 15.6 inch Gaming Laptop 16GB DDR4 512GB SSD </h3>
        <p>$2399.99</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 MyShop | All Rights Reserved</p>
  </footer>



   <script src="amazone.js"></script>



</body>
</html>
